# howie-ai-worker Cloudflare Worker 配置

name = "howie-ai-worker"
main = "src/index.ts"
compatibility_date = "2026-07-17"

# ---- Vectorize 向量数据库绑定 ----
# 首次使用前需要创建索引：
#   wrangler vectorize create howie-docs-index --dimensions=1024 --metric=cosine
# 创建完成后取消下面注释：
[[vectorize]]
binding = "VECTORIZE"
index_name = "howie-docs-index"
remote = true   # 创建索引后再开启，本地 dev 目前用 JSON fallback

# ---- 环境变量 ----
# 敏感信息通过 wrangler secret 设置，不要写在 toml 中：
#   wrangler secret put EMBEDDING_API_KEY
#   wrangler secret put LLM_API_KEY
# 非敏感变量可以直接写在这里：
[vars]
EMBEDDING_MODEL = "embedding-3"
EMBEDDING_API_URL = "https://open.bigmodel.cn/api/paas/v4/embeddings"
EMBEDDING_DIMENSION = "1024"
LLM_MODEL = "deepseek-v4-pro"
LLM_API_URL = "https://api.deepseek.com"
DEPLOY = "local"
